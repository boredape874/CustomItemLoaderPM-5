# ┌──────────────────────────────────────────────────────────┐
# │              CustomLoader  Configuration                 │
# │    YAML 설정으로 커스텀 아이템·블록·엔티티를 등록하세요     │
# │    자세한 설명은 CONFIGURATION.md 를 참고하세요.           │
# └──────────────────────────────────────────────────────────┘

# ══════════════════════════════════
#  🗡️  ITEMS (커스텀 아이템)
# ══════════════════════════════════
# namespace : 필수. "팩이름:아이템id" 형식
# texture   : 필수. textures/items/ 기준 파일명 (확장자 제외)
# 타입별 옵션: durable / food / armor / tool
# fuel      : 화로 연료 시간(틱). 예: 300 (나무 1개 기준)
# on_use    : 아이템 우클릭 시 실행할 액션 목록
# on_attack : 아이템으로 엔티티 공격 시 실행할 액션 목록
# on_eat    : 아이템(음식) 섭취 완료 시 실행할 액션 목록
# 상세 옵션 → CONFIGURATION.md
