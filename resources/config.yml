# ══════════════════════════════════
#  🧱  BLOCKS (커스텀 블록)
# ══════════════════════════════════
# namespace      : 필수. "팩이름:블록id" 형식
# texture        : 필수. textures/blocks/ 기준 파일명 (확장자 제외)
# type           : cube (기본값) / slab / stair / fence / leaves
# tool_type      : pickaxe / axe / shovel / hoe / sword / shears / none
# tool_tier      : 1=나무 2=금 3=돌 4=철 5=다이아
# no_decay       : true → leaves 타입일 때 낙엽 자연소멸 방지 (기본: false)
# xp_drop        : 파괴 시 드랍할 XP. 숫자 또는 {min: 1, max: 3}
# loot_table     : loot_tables 섹션에 정의된 테이블 이름 (drops 대신 사용)
# on_break       : 블록 파괴 시 실행할 액션 목록
# on_place       : 블록 설치 시 실행할 액션 목록
# on_interact    : 블록 우클릭 시 실행할 액션 목록
# 상세 옵션 → CONFIGURATION.md
blocks: {}

