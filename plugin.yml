name: CustomLoader
author: CustomLoader
description: "YAML 설정 파일로 커스텀 아이템·블록·엔티티를 등록하는 PocketMine-MP 5 플러그인"
website: "https://github.com/your-github/CustomLoader"
main: customloader\CustomLoader
version: 1.0.0
api: 5.0.0

extensions:
  Core: ">=8.1"

commands:
  customloader:
    description: "CustomLoader management"
    usage: "/cl <create|build|additem|reload>"
    aliases: [cl]
    permission: customloader.command

permissions:
  customloader.command:
    description: "Allows use of CustomLoader management commands"
    default: op
